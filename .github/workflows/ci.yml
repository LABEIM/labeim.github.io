name: CI Validation

on:
  pull_request:
    branches: [ "main", "master", "astro-version" ]
  workflow_dispatch:

env:
  ASTRO_TELEMETRY_DISABLED: 1

jobs:
  validate:
    name: Lint, Check, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Astro diagnostics
        run: npx astro check

      - name: Verify build compilation
        run: npm run build
